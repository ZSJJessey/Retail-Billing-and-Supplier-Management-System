<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">
    <meta charset="UTF-8">
    <title>超市账单管理系统</title>
    <link rel="stylesheet" href="css/public.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<!--头部-->
<header class="publicHeader">
    <h1>超市账单管理系统</h1>

    <div class="publicHeaderR">
        <p><span>下午好！</span><span style="color: #fff21b" th:text="${username}"> </span> , 欢迎你！</p>
        <a href="/toLogout">退出</a>
    </div>
</header>
<!--时间-->
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
</section>
<!--主体内容-->
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                <li id="active"><a href="/tobillList">账单管理</a></li>
                <li><a href="/toproviderList">供应商管理</a></li>
                <li><a href="/touserList">用户管理</a></li>
                <li><a href="/topassword">密码修改</a></li>
                <li><a href="/toLogout">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">

            <strong>你现在所在的位置是:</strong>
            <span>账单管理页面 >> 订单添加页面</span>
        </div>
        <div class="providerAdd">
            <p></span><span style="color: red ; size: 60px" th:text="${updateerror} "> </span></p>
            <p></span><span style="color: blue; size: 60px" th:text="${updateright}"> </span></p>
            <form action="/toUpdate" method="post">
                <!--div的class 为error是验证错误，ok是验证成功-->
                <div class="">
                    <label for="providerId">订单编码：</label>
                    <input type="text" name="billid" id="providerId" placeholder="322" th:value="${bill.billid}"
                           th:readonly="${bill.billid}"/>
                    <span>*请输入订单编码</span>
                </div>
                <div>
                    <label for="providerName">商品名称：</label>
                    <input type="text" name="goodsName" id="providerName" placeholder="耳机"
                           th:value="${bill.goodsName}"/>
                    <span>*商品名称</span>
                </div>
                <div>
                    <label for="people">商品单位：</label>
                    <input type="text" name="people" id="people" placeholder="北极" th:value="${bill.goodsName}"/>
                    <span>*请输入商品单位</span>

                </div>
                <div>
                    <label for="phone">商品数量：</label>
                    <input type="text" name="goodsNum" id="phone" placeholder="22" th:value="${bill.goodsName}"/>
                    <span>*请输入商品数量</span>
                </div>
                <div>
                    <label for="address">总金额：</label>
                    <input type="text" name="billAmount" id="address" placeholder="200" th:value="${bill.billAmount}"/>
                    <span>*请输入总金额</span>
                </div>
                <div>
                    <label for="fax">供应商：</label>
                    <input type="text" name="supplier" id="fax" placeholder="北大" th:value="${bill.supplier}"/>
                    <span>*请输入供应商</span>
                </div>
                <div>
                    <label>是否付款：</label>
                    <input type="radio" name="isPayment" checked th:value="${bill.isPayment}"/>未付款
                    <input type="radio" name="isPayment" th:value="${bill.isPayment}"/>已付款
                </div>
                <div>
                    <label for="fax">创建时间：</label>
                    <input type="text" name="createTime" id="fax1" placeholder="时间" th:value="${bill.createTime}"/>
                    <span>*请输入创建时间</span>
                </div>
                <div class="providerAddBtn">
                    <!--<a href="#">保存</a>-->
                    <!--<a href="billList.html">返回</a>-->
                    <input type="submit" value="保存"/>
                    <input type="button" value="返回" onclick="history.back(-1)"/>
                </div>
            </form>
        </div>

    </div>
</section>
<footer class="footer">
</footer>
<script src="js/time.js"></script>

</body>
</html>
