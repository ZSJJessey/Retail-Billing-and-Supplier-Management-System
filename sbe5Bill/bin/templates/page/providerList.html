<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">
    <meta charset="UTF-8">
    <title>超市账单管理系统</title>
    <link rel="stylesheet" href="css/public.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<!--头部-->
<header class="publicHeader">
    <h1>超市账单管理系统</h1>

    <div class="publicHeaderR">
        <p><span>下午好！</span><span style="color: #fff21b" th:text="${username}"> </span> , 欢迎你！</p>
        <a href="/toLogout">退出</a>
    </div>
</header>
<!--时间-->
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
</section>
<!--主体内容-->
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                <li><a href="/tobillList">账单管理</a></li>
                <li id="active"><a href="/toproviderList">供应商管理</a></li>
                <li><a href="/touserList">用户管理</a></li>
                <li><a href="/topassword">密码修改</a></li>
                <li><a href="/toLogout">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>供应商管理页面</span>
        </div>
        <div class="search">
            <form action="/searchByWhere2">
                <span>供应商名称：</span>
                <input type="text" name="supplier" th:value="${providerListSupplierName}" placeholder="请输入供应商的名称"/>
                <input type="submit" value="查询" style="width: 200px;"/>
            </form>
            <a href="/toproviderAdd">添加供应商</a>
        </div>
        <!--供应商操作表格-->
        <table class="providerTable" cellpadding="0" cellspacing="0">
            <tr class="firstTr">
                <th width="10%">供应商编码</th>
                <th width="20%">供应商名称</th>
                <th width="10%">联系人</th>
                <th width="10%">联系电话</th>
                <th width="10%">传真</th>
                <th width="10%">创建时间</th>
                <th width="30%">操作</th>
            </tr>
            <tr th:each="provider:${providerList}">
                <td th:text="${provider.id}">供应商编码</td>
                <td th:text="${provider.supplier}">供应商名称</td>
                <td th:text="${provider.linkman}">联系人</td>
                <td th:text="${provider.phone}">联系电话</td>
                <td th:text="${provider.fax}">传真</td>
                <td th:text="${#dates.format(provider.createDate,'yyyy年MM月dd日 HH:mm')}">创建时间</td>
                <td>
                    <a th:href="@{/toproviderView(id=${provider.id})}"><img src="img/read.png" alt="查看" title="查看"/></a>
                    <a th:href="@{/toproviderUpdate(id=${provider.id})}"><img src="img/xiugai.png" alt="修改" title="修改"/></a>
                    <a href="#" class="removeProvider"><img src="img/schu.png" alt="删除" title="删除"
                    th:onclick="|delProvider(${provider.id})|"/></a>

                </td>
            </tr>
        </table>
    </div>
</section>

<!--点击删除按钮后弹出的页面-->
<script type="text/javascript">
    function delProvider(id) {
        var b = confirm("你确定要删除该订单吗？");
        if (b) {
            console.log("/deleteProviderById?id=" + id)
            window.location.href = "/deleteProviderById?id=" + id;
        }
        else {
            console.log("确认不删除")
        }

    }
</script>
