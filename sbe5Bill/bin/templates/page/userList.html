<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head lang="en">
    <meta charset="UTF-8">
    <title>超市账单管理系统</title>
    <link rel="stylesheet" href="css/public.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<!--头部-->
<header class="publicHeader">
    <h1>超市账单管理系统</h1>
    <div class="publicHeaderR">
        <p><span>下午好！</span><span style="color: #fff21b" th:text="${username}"> </span> , 欢迎你！</p>
        <a href="/toLogout">退出</a>
    </div>
</header>
<!--时间-->
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
</section>
<!--主体内容-->
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                <li><a href="/tobillList">账单管理</a></li>
                <li><a href="/toproviderList">供应商管理</a></li>
                <li id="active"><a href="/touserList">用户管理</a></li>
                <li><a href="/topassword">密码修改</a></li>
                <li><a href="/toLogout">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>用户管理页面</span>
        </div>
        <div class="search">
            <form action="/searchByWhere3">
                <span>用户名：</span>
                <input type="text" name="username" th:value="${userListUserName}" placeholder="请输入用户名" />
                <input type="submit" value="查询" style="width: 200px"/>
            </form>
            <a href="/touserAdd">添加用户</a>
        </div>
        <!--用户-->
        <table class="providerTable" cellpadding="0" cellspacing="0">
            <tr class="firstTr">
                <th width="10%">用户编码</th>
                <th width="20%">用户名称</th>
                <th width="10%">性别</th>
                <th width="10%">年龄</th>
                <th width="10%">电话</th>
                <th width="10%">用户类型</th>
                <th width="30%">操作</th>
            </tr>
            <tr th:each="user:${userList}">
                <td th:text="${user.id}">用户编码</td>
                <td th:text="${user.username}">用户名称</td>
                <td th:text="${user.sex}">性别</td>
                <td th:text="${user.age}">年龄</td>
                <td th:text="${user.phonenumber}">电话</td>
                <td th:text="${user.userType}">用户类型</td>
                <td>
                    <a th:href="@{/touserView(id=${user.id})}"><img src="/img/read.png" alt="查看" title="查看"/></a>
                    <a th:href="@{/touserUpdate(id=${user.id})}"><img src="img/xiugai.png" alt="修改" title="修改"/></a>
                    <a href="#" class="removeUser"><img src="img/schu.png" alt="删除" title="删除"
                                                        th:onclick="|delUser(${user.id})|"/></a>
                </td>
            </tr>
        </table>

    </div>
</section>

<!--点击删除按钮后弹出的页面-->
<script type="text/javascript">
    function delUser(id) {
        var b = confirm("你确定要删除该订单吗？");
        if (b) {
            console.log("/deleteUserById?id=" + id)
            window.location.href = "/deleteUserById?id=" + id;
        }
        else {
            console.log("确认不删除")
        }

    }
</script>

<footer class="footer">
</footer>

<script src="js/jquery.js"></script>
<script src="js/js.js"></script>
<script src="js/time.js"></script>

</body>
</html>
