<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head lang="en">
    <meta charset="UTF-8">
    <title>超市账单管理系统</title>
    <link rel="stylesheet" href="css/public.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<!--头部-->
<header class="publicHeader">
    <h1>超市账单管理系统</h1>

    <div class="publicHeaderR">
        <p><span>下午好！</span><span style="color: #fff21b" th:text="${username}"> </span> , 欢迎你！</p>
        <a href="/toLogout">退出</a>
    </div>
</header>
<!--时间-->
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
</section>
<!--主体内容-->
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                <li><a href="/tobillList">账单管理</a></li>
                <li><a href="/toproviderList">供应商管理</a></li>
                <li id="active"><a href="/touserList">用户管理</a></li>
                <li><a href="/topassword">密码修改</a></li>
                <li><a href="/toLogout">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>用户管理页面 >> 用户修改页面</span>
        </div>
        <div class="providerAdd">
            <p></span><span style="color: red ; size: 60px" th:text="${updateerror3} "> </span></p>
            <p></span><span style="color: blue; size: 60px" th:text="${updateright3}"> </span></p>
            <form action="/toUpdateUser" method="post">
                <!--div的class 为error是验证错误，ok是验证成功-->
                <div>
                    <label for="id">用户编码：</label>
                    <input type="text" name="id" id="id" placeholder="1" th:value="${user.id}"/>
                    <span>*</span>
                </div>
                <div>
                    <label for="userName">用户名称：</label>
                    <input type="text" name="username" id="userName" placeholder="韩露" th:value="${user.username}"/>
                    <span>*</span>
                </div>
                <div>
                    <label>用户性别：</label>
                    <select name="sex">
                        <option value="男">男</option>
                        <option value="女" selected>女</option>
                    </select>
                </div>
                <div>
                    <label for="userphone">用户电话：</label>
                    <input type="text" name="phonenumber" id="userphone" placeholder="13533667897" th:value="${user.phonenumber}"/>
                    <span>*</span>
                </div>
                <div>
                    <label for="userAddress">用户地址：</label>
                    <input type="text" name="address" id="userAddress" placeholder="北京" th:value="${user.address}"/>
                </div>
                <div>
                    <label>用户类别：</label>
                    <input type="radio" name="userType" value="管理员"/>管理员
                    <input type="radio" name="userType" value="经理"/>经理
                    <input type="radio" name="userType" value="普通用户"/>普通用户

                </div>
                <div class="userAddBtn">
                    <!--<a href="#">保存</a>-->
                    <!--<a href="userList.html">返回</a>-->
                    <input type="submit" value="保存" />
                    <input type="button" value="返回" onclick="history.back(-1)"/>
                </div>
            </form>
        </div>

    </div>
</section>
<footer class="footer">
</footer>
<script src="js/time.js"></script>

</body>
</html>
