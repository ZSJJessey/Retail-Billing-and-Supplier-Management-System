<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">
    <meta charset="UTF-8">
    <title>超市账单管理系统</title>
    <link rel="stylesheet" href="css/public.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<!--头部-->
<header class="publicHeader">
    <h1>超市账单管理系统</h1>
    <div class="publicHeaderR">
        <p><span>下午好！</span><span style="color: #fff21b" th:text="${username}"> </span> , 欢迎你！</p>
        <a href="/toLogout">退出</a>
    </div>
</header>
<!--时间-->
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
    <p><span style="color: blue;size: 60px" th:if="${addright}" th:text="${addright}"></span></p>
    <p><span style="color: red;size: 60px" th:if="${adderror}" th:text="${adderror}"></span></p>
</section>
<!--主体内容-->
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                <li id="active"><a href="/tobillList">账单管理</a></li>
                <li><a href="/toproviderList">供应商管理</a></li>
                <li><a href="/touserList">用户管理</a></li>
                <li><a href="/topassword">密码修改</a></li>
                <li><a href="/toLogout">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>账单管理页面</span>
        </div>
        <div class="search">
            <form action="/searchByWhere">
                <span>商品名称：</span>
                <input type="text" name="goodsName" th:value="${billListGoodsName}" placeholder="请输入商品的名称"/>

                <span>供应商：</span>
                <!--<select name="supplier">-->
                <input type="text" name="supplier" th:value="${billListSupplierName}" placeholder="请输入供应商"/>
                <!--<option value="">&#45;&#45;请选择&#45;&#45;</option>-->
                <!--<option value="">北京市粮油总公司</option>-->
                <!--<option value="">邯郸市五得利面粉厂</option>-->
                <!--</select>-->

                <span>是否付款：</span>
                <select name="isPayment">
                    <option value="" th:value="${billListIsPaymentName}">--请选择--</option>
                    <option value="1">已付款</option>
                    <option value="0">未付款</option>
                </select>

                <input type="submit" value="查询" style="width: 200px"/>
            </form>
            <a href="/tobillAdd">添加订单</a>
        </div>
        <!--账单表格 样式和供应商公用-->
        <table class="providerTable" cellpadding="0" cellspacing="0">
            <tr class="firstTr">
                <th width="10%">账单编码</th>
                <th width="20%">商品名称</th>
                <th width="10%">供应商</th>
                <th width="10%">账单金额</th>
                <th width="10%">是否付款</th>
                <th width="10%">创建时间</th>
                <th width="30%">操作</th>
            </tr>
            <tr th:each="bill:${billList}">
                <td th:text="${bill.billid}">账单编码</td>
                <td th:text="${bill.goodsName}">商品名称</td>
                <td th:text="${bill.supplier}">供应商</td>
                <td th:text="${bill.billAmount}">账单金额</td>
                <td th:if="${bill.isPayment==1}"> 已支付</td>
                <td th:if="${bill.isPayment==0}"> 未支付</td>
                <td th:text="${#dates.format(bill.createTime,'yyyy年MM月dd日 HH:mm')}"></td>
                <td>
                    <a th:href="@{/tobillView(id=${bill.billid})}"><img src="img/read.png" alt="查看" title="查看"/></a>
                    <a th:href="@{/tobillUpdate(id=${bill.billid})}"><img src="img/xiugai.png" alt="修改" title="修改"/></a>
                    <a href="#" class="removeBill"><img src="img/schu.png" alt="删除" title="删除"
                                                        th:onclick="|delBill(${bill.billid})|"/></a>
                </td>
            </tr>
        </table>
    </div>
</section>

<!--点击删除按钮后弹出的页面-->
<script type="text/javascript">
    function delBill(id) {
        var b = confirm("你确定要删除该订单吗？");
        if (b) {
            console.log("/deleteBillById?id=" + id)
            window.location.href = "/deleteBillById?id=" + id;
        }
        else {
            console.log("确认不删除")
        }

    }


</script>

<footer class="footer">
</footer>

<script src="js/jquery.js"></script>
<script src="js/js.js"></script>
<script src="js/time.js"></script>

</body>
</html>
