<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">
    <meta charset="UTF-8">
    <title>超市账单管理系统</title>
    <link rel="stylesheet" href="css/public.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<!--头部-->
<header class="publicHeader">
    <h1>超市账单管理系统</h1>
    <div class="publicHeaderR">
        <p><span>下午好！</span><span style="color: #fff21b" th:text="${username}"> </span> , 欢迎你！</p>
        <a href="/toLogout">退出</a>
    </div>
</header>
<!--时间-->
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
</section>
<!--主体内容-->
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                <li><a href="/tobillList">账单管理</a></li>
                <li><a href="/toproviderList">供应商管理</a></li>
                <li><a href="/touserList">用户管理</a></li>
                <li><a href="/topassword">密码修改</a></li>
                <li><a href="/toLogout">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>密码修改页面</span>
        </div>
        <div class="providerAdd">
            <form action="/Updatepassword" method="post">
                <!--div的class 为error是验证错误，ok是验证成功-->
                <div class="">
                    <label for="oldPassword">旧密码：</label>
                    <!--为了要把输入的密码传到脚本里 this传input输入的值来传整个对象而不单单传name="oldPassword"的属性-->
                    <input type="password" name="oldPassword" id="oldPassword" onblur="test(this)"
                            required/>
                    <span>*请输入原密码</span>
                    <span id="error" style="color:red; size: 50px"></span>

                </div>
                <div>
                    <label for="newPassword">新密码：</label>
                    <input type="password" name="password" id="newPassword"  required/>
                    <span>*请输入新密码</span>
                </div>
                <div>
                    <label for="reNewPassword">确认新密码：</label>
                    <input type="password" name="rePassword" id="reNewPassword" onblur="testpassword()" required/>
                    <span>*请输入新确认密码，保证和新密码一致</span>
                    <span id="error2" style="color: #ff0000; size: 12px"></span>
                </div>
                <div class="providerAddBtn">
                    <!--<a href="#">保存</a>-->
                    <input type="submit" value="保存"/>
                </div>
            </form>
        </div>
    </div>
</section>
<footer class="footer">
</footer>
<script src="js/time.js"></script>
<script src="js/jquery.js"></script>

<script type="text/javascript">
    function test(s) {
        //()里面是属性
        $.ajax({
            //向后台请求--》去请求那调用方法--》回调请求成功后的方法
            //请求地址 -->去控制类写请求
            url: "/checkPassword",//向后台传参 json格式
            //请求参数
            data: {"password": s.value},
            //请求的方式是get/post类型
            type: "get",
            //回调函数--》请求成功之后的方法
            success: function (msg) {
                var message = msg;
                if (msg) {
                    //把后台的错误信息在前台显现（在脚本中）
                    $("#error").text(message);
                    //光标停留在旧密码框内
                    $("#oldPassword").focus();
                } else {
                    $("#error").text("");
                }
            }
        })
    }
    function testpassword(s) {
        console.log($("#newPassword").val())
        console.log($("#reNewPassword").val())
        //val是前台的变量
        if($("#newPassword").val()!=$("#reNewPassword").val())
        {
            $("#error2").text("请输入新确认密码，保证和新密码一致")
            $("#reNewPassword").focus();
        }else {
            $("#error2").text("")
        }
    }
</script>
</body>
</html>
