spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bills?useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB #单个文件上传大小限制
      max-request-size: 50MB #总文件上次大小限制

    #thymeleaf:
    #cache: true #启动模板缓存
    #encoding: utf-8 #模板编码
    #mode: HTML #应用于模板的模板模式
    #prefix: classpath:/templates/ #指定模板页面存放路径
    #suffix: .html #指定模板页面名称的后缀
    #默认配置
  redis:
    host: 127.0.0.1
    port: 6379
    database: 1



mybatis:
  mapper-locations: classpath:mappers/*.xml #配置mybatis的xml配置文件的路径
  #指定实体类的别名xml文件里只写类名
  #配置xml文件中指定的实体类别名路径
  type-aliases-package: com.zhoushijie.demo.entity
  #控制台打印sql
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
server:
  port: 8888
  #控制台打印sql
  configuration:
    log-prefix: org.apache.ibatis.logging.stdout.StdOutImpl

